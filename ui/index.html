<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TitanClip" />
    <title>TitanClip</title>
    <!-- PAPERCLIP_RUNTIME_BRANDING_START -->
    <!-- PAPERCLIP_RUNTIME_BRANDING_END -->
    <!-- PAPERCLIP_FAVICON_START -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- PAPERCLIP_FAVICON_END -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const key = "titanclip.theme";
        const themeColors = { light: "#FDFCFB", dark: "#1C1D28", titanclip: "#2A2520" };
        const valid = ["light", "dark", "titanclip"];
        try {
          const stored = window.localStorage.getItem(key);
          const theme = valid.includes(stored) ? stored : "dark";
          const root = document.documentElement;
          root.classList.remove("dark", "titanclip");
          if (theme === "dark") root.classList.add("dark");
          if (theme === "titanclip") { root.classList.add("dark"); root.classList.add("titanclip"); }
          root.style.colorScheme = theme === "light" ? "light" : "dark";
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", themeColors[theme] || themeColors.dark);
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
