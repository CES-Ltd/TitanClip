appId: com.titanclip.app
productName: TitanClip
directories:
  output: release
  buildResources: assets

files:
  - dist/**/*

# IMPORTANT: asar must be false for the server child process to work.
# The server process needs real filesystem access to node_modules,
# migration files, onboarding assets, and embedded PostgreSQL.
asar: false

extraResources:
  # Bundled Node.js binary
  - from: build/node-bin
    to: node-bin
  # UI static files
  - from: ui/dist
    to: ui-dist
  # Server compiled JS
  - from: server/dist
    to: server-dist
  # Server onboarding assets
  - from: server/src/onboarding-assets
    to: server-dist/onboarding-assets
  # Server node_modules (built by scripts/prepare-server.mjs)
  - from: build/server-modules
    to: server-dist/node_modules
  # Server package.json (needed by server/dist/version.js -> require("../package.json"))
  - from: server/package.json
    to: server-dist/package.json
  - from: server/package.json
    to: package.json
  # Skills directory
  - from: skills
    to: skills
  # SQLite migrations
  - from: packages/db/src/migrations-sqlite
    to: migrations-sqlite

afterPack: ./scripts/after-pack.mjs

mac:
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: assets/logo.png
  category: public.app-category.developer-tools
  darkModeSupport: true

dmg:
  title: TitanClip
  artifactName: TitanClip-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: assets/logo.png

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: assets/logo.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

protocols:
  - name: TitanClip
    schemes:
      - titanclip

publish:
  provider: github
  owner: ankurCES
  repo: TitanClip
  releaseType: release
